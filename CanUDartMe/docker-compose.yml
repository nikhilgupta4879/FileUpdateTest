version: "3.9"

services:
  # ------------------------------------------------------------------ #
  # PostgreSQL                                                            #
  # ------------------------------------------------------------------ #
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: canudart
      POSTGRES_PASSWORD: canudart
      POSTGRES_DB: canudartme
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canudart"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ #
  # Redis                                                                 #
  # ------------------------------------------------------------------ #
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ------------------------------------------------------------------ #
  # FastAPI Backend                                                        #
  # ------------------------------------------------------------------ #
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ------------------------------------------------------------------ #
  # Flet Frontend (Web)                                                   #
  # ------------------------------------------------------------------ #
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    environment:
      API_BASE_URL: http://backend:8000
      WS_BASE_URL: ws://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    restart: unless-stopped

volumes:
  pg_data:
